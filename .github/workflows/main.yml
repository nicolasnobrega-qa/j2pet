name: teste_seleniumjpet.py
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install Selenium pytest
          # Instalar Chromedriver se necessário
      - name: teste_seleniumjpet.py
        run: pytest #   
